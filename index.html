<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FBX TPS GAME</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }
#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-family:Arial;
z-index:10;
}
#coords{
position:absolute;
bottom:10px;
left:10px;
color:white;
font-family:Arial;
z-index:10;
}
</style>
</head>

<body>

<div id="ui">
WASD Move<br>
Soldier + Fast Run Animation
</div>

<div id="coords"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/FBXLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff,1.3));
const sun = new THREE.DirectionalLight(0xffffff,2);
sun.position.set(10,20,10);
scene.add(sun);

// ================= WORLD =================
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(5000,5000),
new THREE.MeshStandardMaterial({color:0x2f9e44})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ================= LOADERS =================
const loader = new THREE.FBXLoader();

// ================= PLAYER =================
let player;
let mixer;
let runAction;

// ================= LOAD SOLDIER =================
loader.load("soldier.fbx",(obj)=>{

player = obj;
scene.add(player);

player.position.set(0,0,0);

// Animation system
mixer = new THREE.AnimationMixer(player);

});

// ================= LOAD RUN =================
loader.load("Fast Run.fbx",(anim)=>{

if(!mixer) return;

// Mixamo FBX → first animation clip
runAction = mixer.clipAction(anim.animations[0]);
runAction.loop = THREE.LoopRepeat;

});

// ================= INPUT =================
const keys = {};

window.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

// ================= MOVEMENT =================
let speed = 0;

function move(){

if(!player) return;

const moving =
keys["w"]||keys["a"]||keys["s"]||keys["d"];

if(moving){
speed += 0.02;
speed = Math.min(0.25,speed);
}else{
speed *= 0.9;
}

const dir = new THREE.Vector3();

if(keys["w"]) dir.z -= 1;
if(keys["s"]) dir.z += 1;
if(keys["a"]) dir.x -= 1;
if(keys["d"]) dir.x += 1;

dir.normalize();

player.position.addScaledVector(dir,speed);

// ================= THIRD PERSON CAMERA =================
const offset = new THREE.Vector3(0, 2.5, 6); // hinten + oben

const camPos = player.position.clone().add(offset);

camera.position.lerp(camPos,0.1);

camera.lookAt(
player.position.x,
player.position.y + 1.5,
player.position.z
);

// ================= ANIMATION =================
if(runAction){

if(moving){
if(!runAction.isRunning()) runAction.play();
}else{
runAction.stop();
}

}

}

// ================= LOOP =================
const clock = new THREE.Clock();

function animate(){

requestAnimationFrame(animate);

const delta = clock.getDelta();

if(mixer) mixer.update(delta);

move();

document.getElementById("coords").innerHTML =
`X:${player?.position.x.toFixed(2)||0}<br>
Y:${player?.position.y.toFixed(2)||0}<br>
Z:${player?.position.z.toFixed(2)||0}`;

renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
